<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог товаров</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #222; }
        
        /* Сетка каталога */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        /* Карточка товара */
        .product-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .img-placeholder { width: 100%; height: 150px; background: #eee; border-radius: 5px; margin-bottom: 10px; }
        .price { font-weight: bold; color: #28a745; font-size: 1.2rem; }
        .btn-buy { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Наш каталог</h1>
        <div class="catalog">
            <!-- Пример карточки 1 -->
            <div class="product-card">
                <div class="img-placeholder"></div>
                <h3>Товар #1</h3>
                <p class="price">1 500 ₽</p>
                <button class="btn-buy">В корзину</button>
            </div>
            <!-- Пример карточки 2 -->
            <div class="product-card">
                <div class="img-placeholder"></div>
                <h3>Товар #2</h3>
                <p class="price">2 900 ₽</p>
                <button class="btn-buy">В корзину</button>
            </div>
            <!-- Пример карточки 3 -->
            <div class="product-card">
                <div class="img-placeholder"></div>
                <h3>Товар #3</h3>
                <p class="price">990 ₽</p>
                <button class="btn-buy">В корзину</button>
            </div>
        </div>
    </div>
</body>
</html>
